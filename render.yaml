services:
  # ── Backend API ──────────────────────────────────────
  - type: web
    name: prepwise-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your frontend Render URL
      - key: PG_HOST
        fromDatabase:
          name: prepwise-postgres
          property: host
      - key: PG_PORT
        fromDatabase:
          name: prepwise-postgres
          property: port
      - key: PG_DB
        fromDatabase:
          name: prepwise-postgres
          property: database
      - key: PG_USER
        fromDatabase:
          name: prepwise-postgres
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: prepwise-postgres
          property: password
      - key: MONGO_URI
        sync: false          # Set to your MongoDB Atlas URI

  # ── Frontend ─────────────────────────────────────────
  - type: web
    name: prepwise-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://prepwise-backend.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ───────────────────────────────
databases:
  - name: prepwise-postgres
    databaseName: prepwise
    user: postgres
    plan: free
