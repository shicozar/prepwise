version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: prepwise-postgres
    environment:
      POSTGRES_DB: prepwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: prepwise-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: prepwise-backend
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      CLIENT_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: prepwise
      PG_USER: postgres
      PG_PASSWORD: postgres
      MONGO_URI: mongodb://mongo:27017/prepwise
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - mongo
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: prepwise-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:

networks:
  default:
    name: prepwise-network
